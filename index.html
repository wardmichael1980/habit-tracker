<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #faf8f4;
    color: #2a2a2a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .calendar {
    width: 100%;
    max-width: 480px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .header h1 {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 0.5rem;
  }

  .header .year {
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: #aaa;
  }

  /* Grid layout */
  .grid {
    display: grid;
    grid-template-columns: auto repeat(3, 1fr);
    gap: 0;
  }

  /* Column headers (habit names) */
  .col-header {
    text-align: center;
    padding-bottom: 1.5rem;
  }

  .col-header span {
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #999;
  }

  .corner {
    padding-bottom: 1.5rem;
  }

  /* Row labels (day numbers) */
  .row-label {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 1.25rem;
    height: 44px;
  }

  .row-label span {
    font-size: 0.65rem;
    font-weight: 400;
    color: #bbb;
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
  }

  /* Day cell */
  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 44px;
  }

  .dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1.5px solid #ddd;
    background: transparent;
    cursor: pointer;
    position: relative;
    transition: border-color 0.3s ease, background 0.5s ease, box-shadow 0.5s ease;
  }

  .dot:hover {
    border-color: #bbb;
  }

  .dot::after {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: transparent;
    transition: background 0.5s ease;
  }

  /* Lit state — amber/gold glow */
  .dot.lit {
    border-color: rgba(217, 170, 66, 0.4);
    background: #d9aa42;
    box-shadow:
      0 0 12px rgba(217, 170, 66, 0.3),
      0 0 3px rgba(217, 170, 66, 0.5);
  }

  .dot.lit::after {
    background: radial-gradient(
      circle at 40% 35%,
      rgba(255, 223, 130, 0.6) 0%,
      rgba(217, 170, 66, 0) 70%
    );
  }

  /* Glow animation on toggle */
  @keyframes ignite {
    0% {
      box-shadow: 0 0 0 0 rgba(217, 170, 66, 0.6);
      transform: scale(1);
    }
    50% {
      box-shadow: 0 0 20px 4px rgba(217, 170, 66, 0.4);
      transform: scale(1.15);
    }
    100% {
      box-shadow: 0 0 12px rgba(217, 170, 66, 0.3), 0 0 3px rgba(217, 170, 66, 0.5);
      transform: scale(1);
    }
  }

  .dot.ignite {
    animation: ignite 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* Fade out animation */
  @keyframes extinguish {
    0% {
      box-shadow: 0 0 12px rgba(217, 170, 66, 0.3);
      transform: scale(1);
    }
    50% {
      transform: scale(0.9);
    }
    100% {
      box-shadow: none;
      transform: scale(1);
    }
  }

  .dot.extinguish {
    animation: extinguish 0.3s ease-out;
  }

  /* Footer stats */
  .footer {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    margin-top: 2.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid #e0ddd8;
  }

  .stat {
    text-align: center;
  }

  .stat-value {
    font-size: 1.5rem;
    font-weight: 300;
    color: #d9aa42;
    letter-spacing: -0.02em;
  }

  .stat-label {
    font-size: 0.55rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #999;
    margin-top: 0.25rem;
  }

  /* Clear button */
  .clear-row {
    text-align: center;
    margin-top: 2.5rem;
  }

  .clear-btn {
    background: none;
    border: 1px solid #ddd;
    color: #999;
    font-family: inherit;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.6rem 1.5rem;
    border-radius: 100px;
    cursor: pointer;
    transition: color 0.3s, border-color 0.3s;
  }

  .clear-btn:hover {
    color: #777;
    border-color: #bbb;
  }
</style>
</head>
<body>

<div class="calendar">
  <div class="header">
    <h1>Every Day</h1>
    <div class="year" id="year"></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="footer" id="footer"></div>
  <div class="clear-row">
    <button class="clear-btn" onclick="clearAll()">Reset</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'habit-tracker-data';
const HABITS = ['Coding', 'Reading', 'Exercise'];
const DAYS = 10;

function loadData() {
  try {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (data && typeof data === 'object' && !Array.isArray(data)) return data;
  } catch {}
  const init = {};
  HABITS.forEach(h => init[h] = []);
  return init;
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function toggle(habit, day) {
  const data = loadData();
  if (!data[habit]) data[habit] = [];
  const idx = data[habit].indexOf(day);
  const wasLit = idx >= 0;

  if (wasLit) {
    data[habit].splice(idx, 1);
  } else {
    data[habit].push(day);
  }
  saveData(data);
  render();

  // Animate
  const dot = document.querySelector(`[data-habit="${habit}"][data-day="${day}"]`);
  if (dot) {
    const anim = wasLit ? 'extinguish' : 'ignite';
    dot.classList.remove('ignite', 'extinguish');
    void dot.offsetWidth;
    dot.classList.add(anim);
  }
}

function render() {
  const data = loadData();
  const grid = document.getElementById('grid');

  // Build header row: corner + habit names
  let html = '<div class="corner"></div>';
  HABITS.forEach(h => {
    html += `<div class="col-header"><span>${h}</span></div>`;
  });

  // Build day rows
  for (let d = 1; d <= DAYS; d++) {
    html += `<div class="row-label"><span>${String(d).padStart(2, '0')}</span></div>`;
    HABITS.forEach(h => {
      const completed = data[h] || [];
      const lit = completed.includes(d);
      html += `<div class="cell">
        <div class="dot${lit ? ' lit' : ''}"
             data-habit="${h}" data-day="${d}"
             onclick="toggle('${h}', ${d})"
             role="button" tabindex="0"
             aria-label="${h} day ${d}"></div>
      </div>`;
    });
  }

  grid.innerHTML = html;

  // Footer stats
  const footer = document.getElementById('footer');
  footer.innerHTML = HABITS.map(h => {
    const count = (data[h] || []).length;
    return `<div class="stat">
      <div class="stat-value">${count}</div>
      <div class="stat-label">${h}</div>
    </div>`;
  }).join('');
}

function clearAll() {
  if (!confirm('Reset all progress?')) return;
  localStorage.removeItem(STORAGE_KEY);
  render();
}

// Year display
document.getElementById('year').textContent = new Date().getFullYear();

render();
</script>
</body>
</html>
