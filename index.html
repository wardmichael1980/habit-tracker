<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f13;
    color: #e4e4e7;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
  }

  h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.025em;
    margin-bottom: 2rem;
    color: #fff;
  }

  /* Add habit form */
  .add-form {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }

  .add-form input {
    flex: 1;
    padding: 0.75rem 1rem;
    border: 1px solid #27272a;
    border-radius: 12px;
    background: #18181b;
    color: #e4e4e7;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-form input::placeholder { color: #52525b; }
  .add-form input:focus { border-color: #6366f1; }

  .add-form button {
    padding: 0.75rem 1.25rem;
    border: none;
    border-radius: 12px;
    background: #6366f1;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .add-form button:hover { background: #4f46e5; }

  /* Habit list */
  .habits { display: flex; flex-direction: column; gap: 0.75rem; }

  .habit-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 14px;
    transition: border-color 0.2s;
  }

  .habit-card:hover { border-color: #3f3f46; }

  /* Checkbox */
  .check-btn {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    border: 2px solid #3f3f46;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .check-btn:hover { border-color: #6366f1; }

  .check-btn.checked {
    background: #6366f1;
    border-color: #6366f1;
  }

  .check-btn svg {
    width: 16px;
    height: 16px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .check-btn.checked svg { opacity: 1; }

  .habit-info {
    flex: 1;
    min-width: 0;
  }

  .habit-name {
    font-size: 1rem;
    font-weight: 500;
    color: #e4e4e7;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .habit-name.done { color: #71717a; text-decoration: line-through; }

  /* Streak + dots */
  .habit-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.35rem;
  }

  .streak {
    font-size: 0.8rem;
    color: #a1a1aa;
    font-weight: 500;
  }

  .streak strong {
    color: #f59e0b;
    font-weight: 700;
  }

  .dots {
    display: flex;
    gap: 3px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    background: #27272a;
  }

  .dot.filled { background: #6366f1; }

  /* Delete button */
  .delete-btn {
    background: none;
    border: none;
    color: #3f3f46;
    cursor: pointer;
    padding: 0.25rem;
    border-radius: 6px;
    transition: color 0.2s;
    flex-shrink: 0;
  }

  .delete-btn:hover { color: #ef4444; }
  .delete-btn svg { width: 18px; height: 18px; display: block; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: #52525b;
  }

  .empty p { font-size: 1rem; margin-bottom: 0.25rem; }
  .empty span { font-size: 0.85rem; }

  /* Date header */
  .date-header {
    font-size: 0.85rem;
    color: #71717a;
    margin-bottom: 1rem;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Habit Tracker</h1>
  <p class="date-header" id="dateHeader"></p>
  <form class="add-form" id="addForm">
    <input type="text" id="habitInput" placeholder="Add a new habit…" autocomplete="off">
    <button type="submit">Add</button>
  </form>
  <div class="habits" id="habitList"></div>
</div>

<script>
const STORAGE_KEY = 'habit-tracker-data';

function today() {
  return new Date().toISOString().slice(0, 10);
}

function loadData() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch {
    return [];
  }
}

function saveData(habits) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
}

function getStreak(completedDates) {
  if (!completedDates || completedDates.length === 0) return 0;
  const sorted = [...completedDates].sort().reverse();
  const t = today();
  // Streak must include today or yesterday to be active
  if (sorted[0] !== t && sorted[0] !== yesterday()) return 0;
  let streak = 1;
  for (let i = 1; i < sorted.length; i++) {
    const prev = new Date(sorted[i - 1]);
    const curr = new Date(sorted[i]);
    const diff = (prev - curr) / (1000 * 60 * 60 * 24);
    if (diff === 1) {
      streak++;
    } else {
      break;
    }
  }
  return streak;
}

function yesterday() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}

function last7Days() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push(d.toISOString().slice(0, 10));
  }
  return days;
}

function render() {
  const habits = loadData();
  const list = document.getElementById('habitList');
  const t = today();

  if (habits.length === 0) {
    list.innerHTML = '<div class="empty"><p>No habits yet</p><span>Add one above to get started</span></div>';
    return;
  }

  const week = last7Days();

  list.innerHTML = habits.map((h, i) => {
    const done = h.completed && h.completed.includes(t);
    const streak = getStreak(h.completed || []);
    const dots = week.map(d =>
      `<div class="dot${h.completed && h.completed.includes(d) ? ' filled' : ''}"></div>`
    ).join('');

    return `
      <div class="habit-card">
        <button class="check-btn${done ? ' checked' : ''}" onclick="toggle(${i})" aria-label="Toggle habit">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
        <div class="habit-info">
          <div class="habit-name${done ? ' done' : ''}">${escHtml(h.name)}</div>
          <div class="habit-meta">
            <span class="streak">${streak > 0 ? `<strong>${streak}</strong> day${streak !== 1 ? 's' : ''}` : 'No streak'}</span>
            <div class="dots">${dots}</div>
          </div>
        </div>
        <button class="delete-btn" onclick="remove(${i})" aria-label="Delete habit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>`;
  }).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toggle(index) {
  const habits = loadData();
  const h = habits[index];
  if (!h) return;
  if (!h.completed) h.completed = [];
  const t = today();
  const idx = h.completed.indexOf(t);
  if (idx >= 0) {
    h.completed.splice(idx, 1);
  } else {
    h.completed.push(t);
  }
  saveData(habits);
  render();
}

function remove(index) {
  const habits = loadData();
  habits.splice(index, 1);
  saveData(habits);
  render();
}

document.getElementById('addForm').addEventListener('submit', e => {
  e.preventDefault();
  const input = document.getElementById('habitInput');
  const name = input.value.trim();
  if (!name) return;
  const habits = loadData();
  habits.push({ name, completed: [] });
  saveData(habits);
  input.value = '';
  render();
});

// Date header
const d = new Date();
document.getElementById('dateHeader').textContent =
  d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

render();
</script>
</body>
</html>
